<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utah Disclosure Explorer</title>
<style>
:root {
  --bg:      #ffffff;
  --bg2:     #f7f7f5;
  --bg3:     #efefeb;
  --border:  rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --text:    #1a1a18;
  --text2:   #6b6b67;
  --text3:   #9b9b97;
  --accent:  #185fa5;
  --accentL: #e6f1fb;
  --green:   #0f6e56;
  --greenL:  #e1f5ee;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:      #1c1c1a;
    --bg2:     #242422;
    --bg3:     #2c2c2a;
    --border:  rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.18);
    --text:    #e8e8e4;
    --text2:   #9b9b97;
    --text3:   #6b6b67;
    --accent:  #85b7eb;
    --accentL: #042c53;
    --green:   #5dcaa5;
    --greenL:  #04342c;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; color: var(--text); background: var(--bg3); }

/* ── Layout ── */
#layout    { display: flex; height: 100vh; }
#sidebar   { width: 260px; flex-shrink: 0; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#main      { flex: 1; overflow-y: auto; padding: 28px 32px; }

/* ── Sidebar ── */
.sidebar-top   { padding: 14px 14px 12px; border-bottom: 1px solid var(--border); }
.app-title     { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }
#search        { width: 100%; padding: 7px 11px; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--text); outline: none; }
#search:focus  { border-color: var(--accent); }
#search-results { overflow-y: auto; flex: 1; }
.result-item   { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
.result-item:hover  { background: var(--bg2); }
.result-item.active { background: var(--accentL); }
.r-name  { font-size: 13px; font-weight: 500; }
.r-cat   { font-size: 11px; color: var(--text2); margin-top: 2px; }
.empty   { padding: 20px 14px; font-size: 13px; color: var(--text2); text-align: center; }

/* ── Search result groups ── */
.results-group-hdr { padding: 6px 14px 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
                     text-transform: uppercase; color: var(--text3); background: var(--bg2);
                     border-bottom: 1px solid var(--border); }
.r-linked { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--accentL);
            color: var(--accent); font-weight: 500; margin-left: 4px; vertical-align: middle; }

/* ── Entity header ── */
.ent-hdr   { margin-bottom: 22px; }
.ent-name  { font-size: 22px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; }
.ent-meta  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.badge     { font-size: 11px; padding: 3px 8px; border-radius: 5px; background: var(--bg3); color: var(--text2); font-weight: 500; }
.stat      { font-size: 13px; color: var(--text2); }
.ext-link  { font-size: 13px; color: var(--accent); text-decoration: none; }
.ext-link:hover { text-decoration: underline; }

/* ── Donor list ── */
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
.donor-list    { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--bg); }

/* ── Donor row ── */
.donor-row   { border-bottom: 1px solid var(--border); }
.donor-row:last-child { border-bottom: none; }

.d-main      { display: flex; align-items: center; gap: 10px; padding: 9px 13px; cursor: pointer; }
.d-main:hover { background: var(--bg2); }
.d-main.open  { background: var(--bg2); }

.expand-btn  { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
               border: 1px solid var(--border2); border-radius: 4px; color: var(--text2); font-size: 10px;
               transition: transform 0.15s; }
.expand-btn.open { transform: rotate(90deg); }

.d-info      { flex: 1; min-width: 0; }
.d-name      { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-name.linked { color: var(--accent); }
.d-addr      { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

.d-bar-wrap  { width: 60px; flex-shrink: 0; }
.d-bar-bg    { height: 3px; background: var(--bg3); border-radius: 2px; }
.d-bar-fill  { height: 100%; background: var(--accent); border-radius: 2px; }

.d-amt       { flex-shrink: 0; text-align: right; }
.d-total     { font-size: 13px; font-weight: 600; white-space: nowrap; }
.d-gifts     { font-size: 11px; color: var(--text2); }
.date-toggle { background: none; border: none; font-size: 10px; color: var(--accent); cursor: pointer; padding: 1px 0 0; display: block; }
.date-toggle:hover { text-decoration: underline; }
.date-list   { display: none; margin-top: 3px; }
.date-list.open { display: block; }
.date-item   { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; color: var(--text2); padding: 1px 0; }
.di-date     { color: var(--text2); }
.di-amt      { font-weight: 600; color: var(--text); white-space: nowrap; }
.s-date      { display: block; font-size: 11px; color: var(--text2); font-weight: 400; }

/* ── Expanded section ── */
.d-expanded  { display: none; background: var(--bg2); border-top: 1px solid var(--border); }
.d-expanded.open { display: block; }

.sub-section { padding: 10px 13px 10px 41px; border-bottom: 1px solid var(--border); }
.sub-section:last-child { border-bottom: none; }
.sub-label   { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
               color: var(--text2); margin-bottom: 6px; }

.sub-list    { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg); }

/* sub rows (recipients the donor gave to) */
.s-row       { display: flex; align-items: center; gap: 8px; padding: 7px 11px; border-bottom: 1px solid var(--border); cursor: pointer; }
.s-row:last-child { border-bottom: none; }
.s-row:hover { background: var(--bg2); }
.s-row.open  { background: var(--bg2); }
.s-xbtn      { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
               border: 1px solid var(--border2); border-radius: 3px; color: var(--text2); font-size: 9px;
               transition: transform 0.15s; }
.s-xbtn.open { transform: rotate(90deg); }
.s-name      { flex: 1; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-cat       { font-size: 11px; color: var(--text2); flex-shrink: 0; }
.s-amt       { font-size: 13px; font-weight: 600; flex-shrink: 0; text-align: right; }

.s-inline    { border-top: 1px solid var(--border); background: var(--bg2); padding: 10px 11px 10px 27px; }
.s-inline-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text2); margin-bottom: 6px; }

/* action buttons */
.d-actions   { display: flex; align-items: center; gap: 5px; flex-shrink: 0; margin-left: 8px; }
.act-btn     { font-size: 11px; padding: 3px 7px; border: 1px solid var(--border2); border-radius: 4px;
               cursor: pointer; background: transparent; color: var(--text2); white-space: nowrap;
               font-family: inherit; line-height: 1.4; }
.act-btn:hover { background: var(--bg3); }
.act-btn.open  { background: var(--accentL); color: var(--accent); border-color: var(--accent); }

/* show-more */
.show-more   { padding: 7px 13px; font-size: 12px; color: var(--accent); cursor: pointer; text-align: center;
               border-top: 1px solid var(--border); background: var(--bg); }
.show-more:hover { background: var(--accentL); }

/* loading / placeholder */
.loading     { padding: 10px 13px; font-size: 12px; color: var(--text2); }
.placeholder { text-align: center; color: var(--text2); padding-top: 100px; line-height: 1.6; }
.placeholder strong { display: block; font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 6px; }

/* clickable entity names */
.d-name.linked { cursor: pointer; }
.d-name.linked:hover { text-decoration: underline; }
.s-name { cursor: pointer; }
.s-name:hover { text-decoration: underline; }

/* officer modal */
#officer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
                   display: none; align-items: center; justify-content: center; }
#officer-modal   { background: var(--bg); border-radius: 12px; padding: 24px; max-width: 540px;
                   width: 90%; max-height: 78vh; overflow-y: auto; position: relative;
                   box-shadow: 0 8px 40px rgba(0,0,0,0.22); }
.modal-close     { position: absolute; top: 14px; right: 14px; width: 28px; height: 28px;
                   border: none; background: var(--bg3); border-radius: 50%; cursor: pointer;
                   font-size: 15px; color: var(--text2); display: flex; align-items: center;
                   justify-content: center; line-height: 1; font-family: inherit; }
.modal-close:hover { background: var(--border2); }
.modal-title     { font-size: 17px; font-weight: 600; margin-bottom: 4px; padding-right: 36px; }
.modal-sub       { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
.officer-table   { width: 100%; border-collapse: collapse; font-size: 13px; }
.officer-table th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase;
                    letter-spacing: 0.05em; color: var(--text2); padding: 0 12px 8px 0;
                    border-bottom: 1px solid var(--border2); }
.officer-table td { padding: 9px 12px 9px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
.officer-table tr:last-child td { border-bottom: none; }
.kv-grid         { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; font-size: 13px; }
.kv-label        { font-weight: 600; color: var(--text2); white-space: nowrap; }
.kv-value        { color: var(--text); }
</style>
</head>
<body>
<div id="layout">

  <aside id="sidebar">
    <div class="sidebar-top">
      <div class="app-title">Utah Disclosures</div>
      <input id="search" type="text" placeholder="Search entities…" autocomplete="off" spellcheck="false">
    </div>
    <div id="search-results">
      <div class="empty">Type to search 4,454 entities</div>
    </div>
  </aside>

  <!-- Officer modal -->
  <div id="officer-overlay">
    <div id="officer-modal">
      <button class="modal-close" id="officer-close">✕</button>
      <div class="modal-title" id="officer-modal-name"></div>
      <div class="modal-sub" id="officer-modal-sub"></div>
      <div id="officer-modal-content"></div>
    </div>
  </div>

  <main id="main">
    <div class="placeholder" id="placeholder">
      <strong>Utah Disclosure Explorer</strong>
      Search for any candidate, PAC, or organization to explore<br>
      their full donor network — and follow the money upstream.
    </div>
    <div id="entity-view" style="display:none"></div>
  </main>

</div>
<script>
/* ── Constants ── */
const CAT = {
  PCC:"Candidate", CORP:"Corporation", ELECT:"Electioneering",
  INDEXP:"Independent Expenditure", LABOR:"Labor Org",
  PAC:"PAC", PIC:"Political Issues Committee", PARTY:"Political Party",
};
const fmt = n => "$" + Math.round(n).toLocaleString("en-US");
function fmtDate(d) {
  if (!d) return "";
  // handles "MM/DD/YYYY" and "YYYY-MM-DD"
  const [a, b, c] = d.split(/[-\/]/);
  const dt = a.length === 4 ? new Date(+a, +b - 1, +c) : new Date(+c, +a - 1, +b);
  return isNaN(dt) ? d : dt.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
}

/* ── Search ── */
let _st, _searchSeq = 0;
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(_st);
  _st = setTimeout(() => doSearch(e.target.value.trim()), 220);
});

async function doSearch(q) {
  const el = document.getElementById("search-results");
  if (!q) { el.innerHTML = '<div class="empty">Type to search entities and donors</div>'; return; }
  el.innerHTML = '<div class="loading">Searching…</div>';

  const seq = ++_searchSeq;
  const [entities, donors] = await Promise.all([
    apiFetch(`/api/search?q=${enc(q)}&limit=30`),
    apiFetch(`/api/donor/search?q=${enc(q)}&limit=30`),
  ]);
  if (seq !== _searchSeq) return; // stale — a newer search already fired

  el.innerHTML = "";

  if (!entities.length && !donors.length) {
    el.innerHTML = '<div class="empty">No results</div>';
    return;
  }

  if (entities.length) {
    const hdr = mk("div", "results-group-hdr");
    hdr.textContent = `Entities (${entities.length})`;
    el.appendChild(hdr);
    entities.forEach(e => {
      const div = mk("div", "result-item");
      div.innerHTML = `<div class="r-name">${esc(e.name)}</div><div class="r-cat">${CAT[e.category_slug] || e.category_slug}</div>`;
      div.addEventListener("click", () => {
        document.querySelectorAll(".result-item").forEach(x => x.classList.remove("active"));
        div.classList.add("active");
        loadEntity(e.entity_id);
      });
      el.appendChild(div);
    });
  }

  if (donors.length) {
    const hdr = mk("div", "results-group-hdr");
    hdr.textContent = `Donors (${donors.length})`;
    el.appendChild(hdr);
    donors.forEach(d => {
      const div = mk("div", "result-item");
      div.innerHTML = `
        <div class="r-name">${esc(d.name)}${d.linked_entity_id ? ' <span class="r-linked">entity</span>' : ''}</div>
        <div class="r-cat">${d.address || ""}</div>`;
      div.addEventListener("click", () => {
        document.querySelectorAll(".result-item").forEach(x => x.classList.remove("active"));
        div.classList.add("active");
        loadDonor(d.name);
      });
      el.appendChild(div);
    });
  }
}

/* ── Entity view ── */
async function loadEntity(entityId) {
  document.getElementById("placeholder").style.display = "none";
  const view = document.getElementById("entity-view");
  view.style.display = "block";
  view.innerHTML = '<div class="loading">Loading…</div>';

  const data = await apiFetch(`/api/entity/${entityId}/donors`);
  if (data.error) { view.innerHTML = `<div class="empty">${esc(data.error)}</div>`; return; }

  view.innerHTML = "";

  // Header
  const hdr = mk("div", "ent-hdr");
  hdr.innerHTML = `
    <div class="ent-name">${esc(data.name)}</div>
    <div class="ent-meta">
      <span class="badge">${CAT[data.category] || data.category}</span>
      <span class="stat">${fmt(data.total_raised)} total raised</span>
      <span class="stat">·</span>
      <span class="stat">${data.donors.length} donors</span>
      <a class="ext-link" href="https://disclosures.utah.gov/Search/PublicSearch/FolderDetails/${data.folder_id}" target="_blank">↗ View filing</a>
    </div>`;
  hdr.querySelector(".ent-name").addEventListener("click", () => openOfficerModal(String(entityId), data.name));
  hdr.querySelector(".ent-name").title = "Click to view officers";
  view.appendChild(hdr);

  // Donor list
  const lbl = mk("div", "section-label");
  lbl.textContent = "Donors — sorted by total";
  view.appendChild(lbl);

  const list = mk("div", "donor-list");
  view.appendChild(list);
  renderDonorRows(data.donors, data.total_raised, list, new Set([String(entityId)]), 0, String(entityId));
}

/* ── Donor profile view ── */
async function loadDonor(name) {
  document.getElementById("placeholder").style.display = "none";
  const view = document.getElementById("entity-view");
  view.style.display = "block";
  view.innerHTML = '<div class="loading">Loading…</div>';

  const data = await apiFetch(`/api/donor/given?name=${enc(name)}`);
  view.innerHTML = "";

  const totalGiven = (data.given || []).reduce((s, g) => s + g.total, 0);

  const hdr = mk("div", "ent-hdr");
  hdr.innerHTML = `
    <div class="ent-name">${esc(name)}</div>
    <div class="ent-meta">
      <span class="badge">Donor</span>
      <span class="stat">${fmt(totalGiven)} total donated</span>
      <span class="stat">·</span>
      <span class="stat">${(data.given || []).length} recipient${(data.given||[]).length !== 1 ? "s" : ""}</span>
      ${data.linked_entity_id ? `<span class="badge" style="background:var(--accentL);color:var(--accent);">↗ also a registered entity</span>` : ""}
    </div>`;
  view.appendChild(hdr);

  if (data.linked_entity_id) {
    const edata = await apiFetch(`/api/entity/${data.linked_entity_id}/donors`);
    if (!edata.error && edata.donors.length > 0) {
      const lbl = mk("div", "section-label");
      lbl.textContent = `Funds received by ${edata.name} — ${fmt(edata.total_raised)} total`;
      view.appendChild(lbl);
      const list = mk("div", "donor-list");
      view.appendChild(list);
      renderDonorRows(edata.donors, edata.total_raised, list, new Set([String(data.linked_entity_id)]), 0, String(data.linked_entity_id));
    }
  }

  if ((data.given || []).length > 0) {
    const lbl = mk("div", "section-label");
    lbl.textContent = "Contributed to";
    lbl.style.marginTop = data.linked_entity_id ? "1.5rem" : "0";
    view.appendChild(lbl);
    const list = mk("div", "sub-list");
    view.appendChild(list);
    renderGivenRows(data.given, list, new Set(), 0, data.name);
  }

  if (!data.given || !data.given.length) {
    view.innerHTML += '<div class="empty">No contribution history found.</div>';
  }
}

/* ── Render donor rows into a container ── */
function renderDonorRows(donors, totalRaised, container, visited, depth, entityId) {
  const PAGE = 30;
  const slice = donors.slice(0, PAGE);
  slice.forEach(d => container.appendChild(makeDonorRow(d, totalRaised, visited, depth, entityId)));

  if (donors.length > PAGE) {
    const btn = mk("div", "show-more");
    btn.textContent = `Show ${donors.length - PAGE} more donors`;
    btn.addEventListener("click", () => {
      btn.remove();
      donors.slice(PAGE).forEach(d => container.appendChild(makeDonorRow(d, totalRaised, visited, depth, entityId)));
    });
    container.appendChild(btn);
  }
}

/* ── Build a single donor row with two independent expand buttons ── */
function makeDonorRow(donor, totalRaised, visited, depth, entityId) {
  const pct = totalRaised > 0 ? Math.round(donor.total / totalRaised * 100) : 0;
  const linked = !!donor.linked_entity_id;
  const row = mk("div", "donor-row");

  const info = mk("div", "d-info");
  info.innerHTML = `
    <div class="d-name${linked ? " linked" : ""}">${esc(donor.name)}</div>
    ${donor.address ? `<div class="d-addr">${esc(donor.address)}</div>` : ""}`;
  if (linked) {
    const nameEl = info.querySelector(".d-name");
    nameEl.title = "Click to view officers";
    nameEl.addEventListener("click", e => { e.stopPropagation(); openOfficerModal(String(donor.linked_entity_id), donor.name); });
  }

  const barWrap = mk("div", "d-bar-wrap");
  barWrap.innerHTML = `<div class="d-bar-bg"><div class="d-bar-fill" style="width:${pct}%"></div></div>`;

  const amt = mk("div", "d-amt");
  if (donor.gifts === 1) {
    amt.innerHTML = `<div class="d-total">${fmt(donor.total)}</div><div class="d-gifts">${fmtDate(donor.first_date)}</div>`;
  } else {
    amt.innerHTML = `<div class="d-total">${fmt(donor.total)}</div><div class="d-gifts">${donor.gifts} gifts</div>`;
    if (entityId) {
      const toggle = mk("button", "date-toggle");
      toggle.textContent = "▸ dates";
      amt.appendChild(toggle);
      const dateList = mk("div", "date-list");
      amt.appendChild(dateList);
      let loaded = false;
      toggle.addEventListener("click", async e => {
        e.stopPropagation();
        const open = dateList.classList.toggle("open");
        toggle.textContent = open ? "▾ dates" : "▸ dates";
        if (open && !loaded) {
          loaded = true;
          dateList.innerHTML = '<span style="color:var(--text3);font-size:11px">Loading…</span>';
          const rows = await apiFetch(`/api/dates?entity_id=${enc(entityId)}&donor_name=${enc(donor.name)}`);
          dateList.innerHTML = "";
          rows.forEach(r => {
            const item = mk("div", "date-item");
            item.innerHTML = `<span class="di-date">${fmtDate(r.tran_date)}</span><span class="di-amt">${fmt(r.tran_amount)}</span>`;
            dateList.appendChild(item);
          });
        }
      });
    }
  }

  const actions = mk("div", "d-actions");
  const main = mk("div", "d-main");
  main.style.cursor = "default";
  main.appendChild(info);
  main.appendChild(barWrap);
  main.appendChild(amt);
  main.appendChild(actions);
  row.appendChild(main);

  // ── "Funded by" button — who donates TO this entity (only if it's a known entity) ──
  if (linked) {
    const btnF = mk("button", "act-btn");
    btnF.textContent = "↑ funded by";
    actions.appendChild(btnF);
    const secF = mk("div", "d-expanded");
    row.appendChild(secF);
    let loadedF = false;
    btnF.addEventListener("click", async () => {
      const open = secF.classList.toggle("open");
      btnF.classList.toggle("open", open);
      if (open && !loadedF) { loadedF = true; await loadEntityFunders(donor, secF, visited, depth); }
    });
  }

  // ── "Gave to" button — where this donor sent money ──
  const btnG = mk("button", "act-btn");
  btnG.textContent = "↓ gave to";
  actions.appendChild(btnG);
  const secG = mk("div", "d-expanded");
  row.appendChild(secG);
  let loadedG = false;
  btnG.addEventListener("click", async () => {
    const open = secG.classList.toggle("open");
    btnG.classList.toggle("open", open);
    if (open && !loadedG) { loadedG = true; await loadDonorGiven(donor, secG, visited, depth); }
  });

  return row;
}

/* ── Load funders of a donor's own entity ── */
async function loadEntityFunders(donor, container, visited, depth) {
  container.innerHTML = '<div class="loading" style="padding:10px 13px 10px 16px">Loading…</div>';
  const eid = String(donor.linked_entity_id);
  const edata = await apiFetch(`/api/entity/${eid}/donors`);
  container.innerHTML = "";
  if (edata.error || !edata.donors.length) {
    container.innerHTML = '<div class="sub-section"><div style="font-size:12px;color:var(--text2)">No donor data found.</div></div>';
    return;
  }
  const sec = mk("div", "sub-section");
  const lbl = mk("div", "sub-label");
  lbl.textContent = `Funds received by ${edata.name} — ${fmt(edata.total_raised)} total`;
  sec.appendChild(lbl);
  const subList = mk("div", "sub-list donor-list");
  renderDonorRows(edata.donors, edata.total_raised, subList, new Set([...visited, eid]), depth + 1, eid);
  sec.appendChild(subList);
  container.appendChild(sec);
}

/* ── Load all entities this donor gave money to ── */
async function loadDonorGiven(donor, container, visited, depth) {
  container.innerHTML = '<div class="loading" style="padding:10px 13px 10px 16px">Loading…</div>';
  const givenData = await apiFetch(`/api/donor/given?name=${enc(donor.name)}`);
  container.innerHTML = "";
  const others = (givenData.given || []).filter(g => !visited.has(String(g.entity_id)));
  if (!others.length) {
    container.innerHTML = '<div class="sub-section"><div style="font-size:12px;color:var(--text2)">No contribution history found.</div></div>';
    return;
  }
  const sec = mk("div", "sub-section");
  const lbl = mk("div", "sub-label");
  lbl.textContent = `${esc(donor.name)} contributed to`;
  sec.appendChild(lbl);
  const subList = mk("div", "sub-list");
  renderGivenRows(others, subList, visited, depth, donor.name);
  sec.appendChild(subList);
  container.appendChild(sec);
}

/* ── Render "also gave to" rows (recipient entities) ── */
function renderGivenRows(given, container, visited, depth, donorName) {
  const PAGE = 20;
  const slice = given.slice(0, PAGE);
  slice.forEach(r => container.appendChild(makeGivenRow(r, container, visited, depth, donorName)));

  if (given.length > PAGE) {
    const btn = mk("div", "show-more");
    btn.textContent = `Show ${given.length - PAGE} more`;
    btn.addEventListener("click", () => {
      btn.remove();
      given.slice(PAGE).forEach(r => container.insertBefore(makeGivenRow(r, container, visited, depth, donorName), null));
    });
    container.appendChild(btn);
  }
}

/* ── A single "gave to" row with two independent expand buttons ── */
function makeGivenRow(r, listEl, visited, depth, donorName) {
  const wrap = mk("div");

  const row = mk("div", "s-row");
  row.style.cursor = "default";
  const name = mk("div", "s-name"); name.textContent = r.entity_name;
  name.title = "Click to view officers";
  name.addEventListener("click", e => { e.stopPropagation(); openOfficerModal(String(r.entity_id), r.entity_name); });
  const cat  = mk("div", "s-cat");  cat.textContent  = CAT[r.category] || r.category || "";

  const amt = mk("div", "s-amt");
  if (r.gifts === 1) {
    amt.innerHTML = `<span>${fmt(r.total)}</span><span class="s-date">${fmtDate(r.first_date)}</span>`;
  } else {
    amt.innerHTML = `<span>${fmt(r.total)}</span>`;
    if (donorName) {
      const toggle = mk("button", "date-toggle");
      toggle.textContent = "▸ dates";
      amt.appendChild(toggle);
      const dateList = mk("div", "date-list");
      amt.appendChild(dateList);
      let loaded = false;
      toggle.addEventListener("click", async e => {
        e.stopPropagation();
        const open = dateList.classList.toggle("open");
        toggle.textContent = open ? "▾ dates" : "▸ dates";
        if (open && !loaded) {
          loaded = true;
          dateList.innerHTML = '<span style="color:var(--text3);font-size:11px">Loading…</span>';
          const rows = await apiFetch(`/api/dates?entity_id=${enc(String(r.entity_id))}&donor_name=${enc(donorName)}`);
          dateList.innerHTML = "";
          rows.forEach(tx => {
            const item = mk("div", "date-item");
            item.innerHTML = `<span class="di-date">${fmtDate(tx.tran_date)}</span><span class="di-amt">${fmt(tx.tran_amount)}</span>`;
            dateList.appendChild(item);
          });
        }
      });
    }
  }
  const actions = mk("div", "d-actions");

  const btnF = mk("button", "act-btn"); btnF.textContent = "↑ funded by";
  const btnG = mk("button", "act-btn"); btnG.textContent = "↓ gave to";
  actions.appendChild(btnF);
  actions.appendChild(btnG);

  row.appendChild(name); row.appendChild(cat); row.appendChild(amt); row.appendChild(actions);
  wrap.appendChild(row);

  // ── "Funded by" — who donates TO this entity ──
  const secF = mk("div", "s-inline"); secF.style.display = "none";
  wrap.appendChild(secF);
  let loadedF = false;

  btnF.addEventListener("click", async () => {
    const closing = secF.style.display !== "none";
    secF.style.display = closing ? "none" : "";
    btnF.classList.toggle("open", !closing);
    if (!closing && !loadedF) {
      loadedF = true;
      if (depth >= 20) { loadEntity(r.entity_id); return; }
      secF.innerHTML = '<div class="loading">Loading…</div>';
      const edata = await apiFetch(`/api/entity/${r.entity_id}/donors`);
      secF.innerHTML = "";
      const lbl = mk("div", "s-inline-label");
      lbl.textContent = `${esc(edata.name)} — ${fmt(edata.total_raised)} raised, ${edata.donors.length} donors`;
      secF.appendChild(lbl);
      const innerList = mk("div", "donor-list");
      renderDonorRows(edata.donors, edata.total_raised, innerList, new Set([...visited, String(r.entity_id)]), depth + 1, String(r.entity_id));
      secF.appendChild(innerList);
    }
  });

  // ── "Gave to" — what this entity donated to others ──
  const secG = mk("div", "s-inline"); secG.style.display = "none";
  wrap.appendChild(secG);
  let loadedG = false;

  btnG.addEventListener("click", async () => {
    const closing = secG.style.display !== "none";
    secG.style.display = closing ? "none" : "";
    btnG.classList.toggle("open", !closing);
    if (!closing && !loadedG) {
      loadedG = true;
      secG.innerHTML = '<div class="loading">Loading…</div>';
      const givenData = await apiFetch(`/api/donor/given?name=${enc(r.entity_name)}`);
      secG.innerHTML = "";
      const others = (givenData.given || []).filter(g => !visited.has(String(g.entity_id)));
      if (!others.length) {
        secG.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:var(--text2)">No contribution history found.</div>';
        return;
      }
      const lbl = mk("div", "s-inline-label");
      lbl.textContent = `${esc(r.entity_name)} contributed to`;
      secG.appendChild(lbl);
      const subList = mk("div", "sub-list");
      renderGivenRows(others, subList, new Set([...visited, String(r.entity_id)]), depth + 1, r.entity_name);
      secG.appendChild(subList);
    }
  });

  return wrap;
}

/* ── Officer modal ── */
function openOfficerModal(entityId, name) {
  document.getElementById("officer-modal-name").textContent = name;
  const sub = document.getElementById("officer-modal-sub");
  sub.innerHTML = "";
  const content = document.getElementById("officer-modal-content");
  content.innerHTML = '<div class="loading" style="padding:0 0 4px">Loading officer information…</div>';
  document.getElementById("officer-overlay").style.display = "flex";

  apiFetch(`/api/entity/${entityId}/officers`).then(data => {
    if (data.filing_url) {
      sub.innerHTML = `<a class="ext-link" href="${esc(data.filing_url)}" target="_blank">↗ View filing</a>`;
    }
    const officers = data.officers || [];
    if (!officers.length) {
      content.innerHTML = '<div style="font-size:13px;color:var(--text2)">No officer information found.</div>';
      return;
    }
    if (officers[0] && officers[0].error) {
      content.innerHTML = `<div style="font-size:13px;color:var(--text2)">Could not load: ${esc(officers[0].error)}</div>`;
      return;
    }

    content.innerHTML = "";
    officers.forEach((o, i) => {
      if (i > 0) {
        const sep = mk("div");
        sep.style.cssText = "border-top:1px solid var(--border);margin:14px 0;";
        content.appendChild(sep);
      }
      const roleEl = mk("div");
      roleEl.style.cssText = "font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:8px;";
      roleEl.textContent = o.role || "Officer";
      content.appendChild(roleEl);
      const grid = mk("div", "kv-grid");
      [["name","Name"],["address","Address"],["phone","Phone"],["email","Email"]].forEach(([key, label]) => {
        if (!o[key]) return;
        const lbl = mk("div", "kv-label"); lbl.textContent = label + ":";
        const val = mk("div", "kv-value"); val.textContent = o[key];
        grid.appendChild(lbl); grid.appendChild(val);
      });
      content.appendChild(grid);
    });
  });
}

function closeOfficerModal() {
  document.getElementById("officer-overlay").style.display = "none";
}
document.getElementById("officer-overlay").addEventListener("click", e => {
  if (e.target.id === "officer-overlay") closeOfficerModal();
});
document.getElementById("officer-close").addEventListener("click", closeOfficerModal);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeOfficerModal(); });

/* ── Helpers ── */
function mk(tag, cls) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  return el;
}
function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function enc(s) { return encodeURIComponent(s); }
async function apiFetch(url) {
  try {
    const r = await fetch(url);
    return r.json();
  } catch(e) {
    return { error: e.message };
  }
}
</script>
